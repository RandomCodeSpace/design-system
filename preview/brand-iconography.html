<!doctype html>
<html data-theme="light"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><link rel="stylesheet" href="_card.css?v=6">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body>
<div class="card">
  <div style="font-family:var(--font-mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:#5A5A5A;">Iconography · Lucide · 1.5px stroke</div>
  <div style="display:grid;grid-template-columns:repeat(10,1fr);gap:14px;color:#3D3D3D;">
    <div style="display:flex;flex-direction:column;align-items:center;gap:5px;"><i data-lucide="terminal" width="20" height="20" stroke-width="1.5"></i><span style="font-family:var(--font-mono);font-size:9px;color:#A6A6A6;">terminal</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:5px;"><i data-lucide="server" width="20" height="20" stroke-width="1.5"></i><span style="font-family:var(--font-mono);font-size:9px;color:#A6A6A6;">server</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:5px;"><i data-lucide="shield" width="20" height="20" stroke-width="1.5"></i><span style="font-family:var(--font-mono);font-size:9px;color:#A6A6A6;">shield</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:5px;"><i data-lucide="key" width="20" height="20" stroke-width="1.5"></i><span style="font-family:var(--font-mono);font-size:9px;color:#A6A6A6;">key</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:5px;"><i data-lucide="database" width="20" height="20" stroke-width="1.5"></i><span style="font-family:var(--font-mono);font-size:9px;color:#A6A6A6;">database</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:5px;"><i data-lucide="git-branch" width="20" height="20" stroke-width="1.5"></i><span style="font-family:var(--font-mono);font-size:9px;color:#A6A6A6;">git-branch</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:5px;"><i data-lucide="settings" width="20" height="20" stroke-width="1.5"></i><span style="font-family:var(--font-mono);font-size:9px;color:#A6A6A6;">settings</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:5px;"><i data-lucide="search" width="20" height="20" stroke-width="1.5"></i><span style="font-family:var(--font-mono);font-size:9px;color:#A6A6A6;">search</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:5px;"><i data-lucide="activity" width="20" height="20" stroke-width="1.5"></i><span style="font-family:var(--font-mono);font-size:9px;color:#A6A6A6;">activity</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:5px;"><i data-lucide="box" width="20" height="20" stroke-width="1.5"></i><span style="font-family:var(--font-mono);font-size:9px;color:#A6A6A6;">box</span></div>
  </div>
  <div style="display:flex;align-items:center;gap:18px;padding-top:10px;border-top:1px solid rgba(28,28,28,0.08);color:#5A5A5A;font-family:var(--font-mono);font-size:12px;">
    <span>Unicode glyphs:</span>
    <span style="color:#1C1C1C;">→ ← ↗ · ✓ ✕ ⌘ ⌥ ⇧ ⌃</span>
    <span style="color:#E24548;margin-left:auto;">no emoji</span>
  </div>
</div>
<script>lucide.createIcons();</script>
</body></html>
