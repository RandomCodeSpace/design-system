<!doctype html>
<html data-theme="light"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><link rel="stylesheet" href="_card.css?v=6">
<style>
  .tabs-line{display:flex;border-bottom:1px solid rgba(28,28,28,0.10);gap:0;}
  .tabs-line .tab{padding:8px 14px;font-family:var(--font-sans);font-size:13px;font-weight:500;color:#5A5A5A;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color 140ms;}
  .tabs-line .tab:hover{color:#1C1C1C;}
  .tabs-line .tab.active{color:#1C1C1C;border-bottom-color:#E60000;}
  .tabs-line .tab.disabled{color:#A6A6A6;cursor:not-allowed;}
  .tabs-line .tab .count{font-family:var(--font-mono);font-size:10px;background:#F5F5F5;padding:1px 6px;border-radius:9999px;margin-left:6px;color:#5A5A5A;}
  .tabs-line .tab.active .count{background:#FFD6D6;color:#9E0000;}

  .tabs-card{display:flex;gap:2px;}
  .tabs-card .tab{padding:8px 14px;font-family:var(--font-sans);font-size:13px;font-weight:500;color:#5A5A5A;cursor:pointer;background:#F5F5F5;border:1px solid rgba(28,28,28,0.08);border-bottom:none;border-radius:4px 4px 0 0;}
  .tabs-card .tab.active{background:#FFFFFF;color:#1C1C1C;}

  .tabs-seg{display:inline-flex;background:#F5F5F5;border:1px solid rgba(28,28,28,0.08);border-radius:6px;padding:2px;}
  .tabs-seg .tab{padding:5px 12px;font-family:var(--font-sans);font-size:12px;font-weight:500;color:#5A5A5A;cursor:pointer;border-radius:4px;}
  .tabs-seg .tab.active{background:#FFFFFF;color:#1C1C1C;box-shadow:0 1px 2px rgba(28,28,28,0.06);}
</style></head>
<body>
<div class="card">
  <div style="font-family:var(--font-mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:#5A5A5A;">Tabs · line · card · segmented</div>

  <div>
    <div style="font-family:var(--font-mono);font-size:10px;color:#A6A6A6;letter-spacing:0.04em;text-transform:uppercase;margin-bottom:8px;">Line · default</div>
    <div class="tabs-line">
      <div class="tab active">Overview</div>
      <div class="tab">Logs <span class="count">128</span></div>
      <div class="tab">Configuration</div>
      <div class="tab">Activity</div>
      <div class="tab disabled">Billing</div>
    </div>
  </div>

  <div>
    <div style="font-family:var(--font-mono);font-size:10px;color:#A6A6A6;letter-spacing:0.04em;text-transform:uppercase;margin-bottom:8px;">Card</div>
    <div class="tabs-card">
      <div class="tab active">Production</div>
      <div class="tab">Staging</div>
      <div class="tab">Development</div>
    </div>
    <div style="height:1px;background:rgba(28,28,28,0.08);"></div>
  </div>

  <div>
    <div style="font-family:var(--font-mono);font-size:10px;color:#A6A6A6;letter-spacing:0.04em;text-transform:uppercase;margin-bottom:8px;">Segmented</div>
    <div class="tabs-seg">
      <div class="tab active">All</div>
      <div class="tab">Running</div>
      <div class="tab">Stopped</div>
      <div class="tab">Failed</div>
    </div>
  </div>
</div>
</body></html>
