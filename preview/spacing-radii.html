<!doctype html>
<html data-theme="light"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><link rel="stylesheet" href="_card.css?v=6"></head>
<body>
<div class="card">
  <div style="font-family:var(--font-mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:#5A5A5A;">Radii</div>
  <div style="display:flex;gap:20px;align-items:flex-end;">
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
      <div style="width:72px;height:72px;background:#FFFFFF;border:1px solid rgba(28,28,28,0.14);border-radius:2px;"></div>
      <div style="font-family:var(--font-mono);font-size:10px;color:#5A5A5A;">xs · 2</div>
      <div style="font-family:var(--font-sans);font-size:10px;color:#A6A6A6;">inline code</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
      <div style="width:72px;height:72px;background:#FFFFFF;border:1px solid rgba(28,28,28,0.14);border-radius:4px;box-shadow:0 0 0 2px rgba(28,28,28,0.12);"></div>
      <div style="font-family:var(--font-mono);font-size:10px;color:#1C1C1C;font-weight:600;">sm · 4 ★</div>
      <div style="font-family:var(--font-sans);font-size:10px;color:#A6A6A6;">default</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
      <div style="width:72px;height:72px;background:#FFFFFF;border:1px solid rgba(28,28,28,0.14);border-radius:6px;"></div>
      <div style="font-family:var(--font-mono);font-size:10px;color:#5A5A5A;">md · 6</div>
      <div style="font-family:var(--font-sans);font-size:10px;color:#A6A6A6;">—</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
      <div style="width:72px;height:72px;background:#FFFFFF;border:1px solid rgba(28,28,28,0.14);border-radius:8px;"></div>
      <div style="font-family:var(--font-mono);font-size:10px;color:#5A5A5A;">lg · 8</div>
      <div style="font-family:var(--font-sans);font-size:10px;color:#A6A6A6;">modals</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
      <div style="width:72px;height:72px;background:#FFFFFF;border:1px solid rgba(28,28,28,0.14);border-radius:9999px;"></div>
      <div style="font-family:var(--font-mono);font-size:10px;color:#5A5A5A;">full</div>
      <div style="font-family:var(--font-sans);font-size:10px;color:#A6A6A6;">avatars, pills</div>
    </div>
  </div>
</div>
</body></html>
