<!doctype html>
<html data-theme="light"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><link rel="stylesheet" href="_card.css?v=6"><title>Charts — Line / Area / Bar</title>
<style>
  .chart-frame{background:#FFFFFF;border:1px solid rgba(28,28,28,0.08);border-radius:4px;padding:14px;}
  .chart-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;}
  .chart-title{font-family:var(--font-sans);font-size:13px;font-weight:600;color:#1C1C1C;}
  .chart-sub{font-family:var(--font-mono);font-size:11px;color:#5A5A5A;}
  .legend{display:flex;gap:14px;margin-top:8px;font-family:var(--font-mono);font-size:11px;color:#3D3D3D;}
  .legend i{display:inline-block;width:8px;height:8px;border-radius:1px;margin-right:6px;vertical-align:middle;}
  .axis text{font-family:var(--font-mono);font-size:10px;fill:#5A5A5A;}
  .grid line{stroke:rgba(28,28,28,0.06);stroke-width:1;}
  .engine-pill{font-family:var(--font-mono);font-size:9px;letter-spacing:0.06em;text-transform:uppercase;color:#5A5A5A;background:#F5F5F5;border:1px solid rgba(28,28,28,0.08);border-radius:3px;padding:2px 6px;}
</style></head>
<body>
<div class="card" style="background:#F5F5F5;">
  <div style="display:flex;justify-content:space-between;align-items:center;">
    <div style="font-family:var(--font-mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:#5A5A5A;">Charts · Chart (line · area · bar)</div>
    <span class="engine-pill">engine: auto · canvas → webgl → webgpu</span>
  </div>

  <!-- LINE -->
  <div class="chart-frame">
    <div class="chart-head">
      <div>
        <div class="chart-title">Request rate · last 24h</div>
        <div class="chart-sub">2 series · 144 points · uPlot canvas</div>
      </div>
      <span class="engine-pill">canvas</span>
    </div>
    <svg viewBox="0 0 600 180" width="100%" height="180" preserveAspectRatio="none">
      <g class="grid">
        <line x1="0" y1="30"  x2="600" y2="30"/>
        <line x1="0" y1="70"  x2="600" y2="70"/>
        <line x1="0" y1="110" x2="600" y2="110"/>
        <line x1="0" y1="150" x2="600" y2="150"/>
      </g>
      <polyline fill="none" stroke="#E60000" stroke-width="1.5" stroke-linejoin="round"
        points="0,120 30,108 60,114 90,90 120,98 150,75 180,82 210,68 240,72 270,55 300,62 330,48 360,52 390,40 420,46 450,32 480,40 510,28 540,36 570,24 600,30"/>
      <polyline fill="none" stroke="#1C1C1C" stroke-width="1.5" stroke-linejoin="round"
        points="0,140 30,138 60,134 90,128 120,132 150,118 180,124 210,116 240,120 270,108 300,114 330,102 360,108 390,98 420,104 450,94 480,100 510,90 540,96 570,84 600,90"/>
    </svg>
    <div class="legend"><span><i style="background:#E60000;"></i>requests/sec</span><span><i style="background:#1C1C1C;"></i>p99 latency (ms)</span></div>
  </div>

  <!-- AREA -->
  <div class="chart-frame">
    <div class="chart-head">
      <div>
        <div class="chart-title">CPU utilization · 4 services</div>
        <div class="chart-sub">stacked area · 720 points · uPlot canvas</div>
      </div>
      <span class="engine-pill">canvas</span>
    </div>
    <svg viewBox="0 0 600 180" width="100%" height="180" preserveAspectRatio="none">
      <g class="grid">
        <line x1="0" y1="30"  x2="600" y2="30"/>
        <line x1="0" y1="70"  x2="600" y2="70"/>
        <line x1="0" y1="110" x2="600" y2="110"/>
        <line x1="0" y1="150" x2="600" y2="150"/>
      </g>
      <path d="M0,160 L0,130 L60,124 L120,118 L180,108 L240,114 L300,102 L360,108 L420,98 L480,104 L540,92 L600,98 L600,180 L0,180 Z" fill="#E6000033" stroke="#E60000" stroke-width="1"/>
      <path d="M0,150 L0,138 L60,134 L120,130 L180,124 L240,128 L300,118 L360,124 L420,116 L480,122 L540,110 L600,118 L600,180 L0,180 Z" fill="#1C1C1C22" stroke="#1C1C1C" stroke-width="1"/>
    </svg>
  </div>

  <!-- BAR -->
  <div class="chart-frame">
    <div class="chart-head">
      <div>
        <div class="chart-title">Deployments · last 14 days</div>
        <div class="chart-sub">bar · 14 buckets</div>
      </div>
      <span class="engine-pill">canvas</span>
    </div>
    <svg viewBox="0 0 600 180" width="100%" height="180" preserveAspectRatio="none">
      <g class="grid">
        <line x1="0" y1="60"  x2="600" y2="60"/>
        <line x1="0" y1="120" x2="600" y2="120"/>
      </g>
      <g fill="#1C1C1C">
        <rect x="10"  y="100" width="28" height="60"/>
        <rect x="50"  y="80"  width="28" height="80"/>
        <rect x="90"  y="120" width="28" height="40"/>
        <rect x="130" y="60"  width="28" height="100"/>
        <rect x="170" y="40"  width="28" height="120"/>
        <rect x="210" y="90"  width="28" height="70"/>
        <rect x="250" y="110" width="28" height="50"/>
        <rect x="290" y="50"  width="28" height="110"/>
        <rect x="330" y="70"  width="28" height="90"/>
        <rect x="370" y="100" width="28" height="60"/>
        <rect x="410" y="30"  width="28" height="130"/>
        <rect x="450" y="60"  width="28" height="100"/>
        <rect x="490" y="90"  width="28" height="70"/>
        <rect x="530" y="50"  width="28" height="110" fill="#E60000"/>
      </g>
    </svg>
  </div>
</div>
</body></html>
