<!doctype html>
<html data-theme="light"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><link rel="stylesheet" href="_card.css?v=6"></head>
<body>
<div class="card" style="background:#F5F5F5;">
  <div style="font-family:var(--font-mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:#5A5A5A;">Elevation · shadows</div>
  <div style="display:flex;gap:20px;justify-content:space-between;">
    <div style="display:flex;flex-direction:column;align-items:center;gap:10px;flex:1;">
      <div style="width:84px;height:56px;background:#FFFFFF;border-radius:4px;"></div>
      <div style="font-family:var(--font-mono);font-size:10px;color:#5A5A5A;">none</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:10px;flex:1;">
      <div style="width:84px;height:56px;background:#FFFFFF;border-radius:4px;box-shadow:0 1px 1px rgba(28,28,28,0.04);"></div>
      <div style="font-family:var(--font-mono);font-size:10px;color:#5A5A5A;">xs</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:10px;flex:1;">
      <div style="width:84px;height:56px;background:#FFFFFF;border-radius:4px;box-shadow:0 1px 2px rgba(28,28,28,0.06),0 1px 1px rgba(28,28,28,0.04);"></div>
      <div style="font-family:var(--font-mono);font-size:10px;color:#5A5A5A;">sm · hover</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:10px;flex:1;">
      <div style="width:84px;height:56px;background:#FFFFFF;border-radius:4px;box-shadow:0 4px 12px rgba(28,28,28,0.07),0 1px 2px rgba(28,28,28,0.04);"></div>
      <div style="font-family:var(--font-mono);font-size:10px;color:#5A5A5A;">md · dropdown</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:10px;flex:1;">
      <div style="width:84px;height:56px;background:#FFFFFF;border-radius:4px;box-shadow:0 12px 32px rgba(28,28,28,0.10),0 2px 6px rgba(28,28,28,0.05);"></div>
      <div style="font-family:var(--font-mono);font-size:10px;color:#5A5A5A;">lg · modal</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:10px;flex:1;">
      <div style="width:84px;height:56px;background:#FFFFFF;border-radius:4px;box-shadow:0 0 0 3px rgba(28,28,28,0.22);"></div>
      <div style="font-family:var(--font-mono);font-size:10px;color:#1C1C1C;font-weight:600;">focus</div>
    </div>
  </div>
  <div style="font-family:var(--font-sans);font-size:12px;color:#5A5A5A;line-height:1.5;">Shadows are structural, not decorative. Borders do most of the work.</div>
</div>
</body></html>
