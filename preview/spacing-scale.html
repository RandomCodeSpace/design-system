<!doctype html>
<html data-theme="light"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><link rel="stylesheet" href="_card.css?v=6"></head>
<body>
<div class="card">
  <div style="font-family:var(--font-mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:#5A5A5A;">Spacing · 4px base</div>
  <div style="display:flex;align-items:flex-end;gap:16px;">
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:4px;height:4px;background:#1C1C1C;border-radius:1px;"></div><div style="font-family:var(--font-mono);font-size:10px;color:#5A5A5A;">1 · 4</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:8px;height:8px;background:#1C1C1C;border-radius:1px;"></div><div style="font-family:var(--font-mono);font-size:10px;color:#5A5A5A;">2 · 8</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:12px;height:12px;background:#1C1C1C;border-radius:2px;"></div><div style="font-family:var(--font-mono);font-size:10px;color:#5A5A5A;">3 · 12</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:16px;height:16px;background:#1C1C1C;border-radius:2px;"></div><div style="font-family:var(--font-mono);font-size:10px;color:#5A5A5A;">4 · 16</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:24px;height:24px;background:#1C1C1C;border-radius:3px;"></div><div style="font-family:var(--font-mono);font-size:10px;color:#5A5A5A;">6 · 24</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:32px;height:32px;background:#1C1C1C;border-radius:4px;"></div><div style="font-family:var(--font-mono);font-size:10px;color:#5A5A5A;">8 · 32</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:48px;height:48px;background:#1C1C1C;border-radius:4px;"></div><div style="font-family:var(--font-mono);font-size:10px;color:#5A5A5A;">12 · 48</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:64px;height:64px;background:#1C1C1C;border-radius:4px;"></div><div style="font-family:var(--font-mono);font-size:10px;color:#5A5A5A;">16 · 64</div></div>
  </div>
  <div style="font-family:var(--font-sans);font-size:12px;color:#5A5A5A;line-height:1.5;">All spacing is a multiple of 4. 8-point grid governs layout; 4-point for internals. Section rhythm: 64–96px.</div>
</div>
</body></html>
