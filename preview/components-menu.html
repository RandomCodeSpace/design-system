<!doctype html>
<html data-theme="dark"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><link rel="stylesheet" href="_card.css?v=6"></head>
<body>
<div class="card" style="background:#1C1C1C;">
  <div style="font-family:var(--font-mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:#808080;">Menu</div>
  <div style="background:#2B2B2B;border:1px solid rgba(255,255,255,0.07);border-radius:6px;padding:4px;width:300px;box-shadow:0 18px 40px rgba(0,0,0,0.6),0 2px 8px rgba(0,0,0,0.4);">
    <div style="padding:6px 10px;font-family:var(--font-mono);font-size:10px;letter-spacing:0.04em;text-transform:uppercase;color:#5A5A5A;">Service</div>
    <div style="display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:3px;background:#3D3D3D;font-family:var(--font-sans);font-size:13px;color:#FFFFFF;">
      <span style="width:14px;height:14px;display:inline-flex;align-items:center;justify-content:center;color:#808080;">▸</span>
      <span style="flex:1;">Restart service</span>
      <span style="font-family:var(--font-mono);font-size:10px;color:#5A5A5A;">⌘ R</span>
    </div>
    <div style="display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:3px;font-family:var(--font-sans);font-size:13px;color:#CCCCCC;">
      <span style="width:14px;height:14px;display:inline-flex;align-items:center;justify-content:center;color:#5A5A5A;">✎</span>
      <span style="flex:1;">Edit configuration</span>
      <span style="font-family:var(--font-mono);font-size:10px;color:#5A5A5A;">⌘ E</span>
    </div>
    <div style="display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:3px;font-family:var(--font-sans);font-size:13px;color:#CCCCCC;">
      <span style="width:14px;height:14px;display:inline-flex;align-items:center;justify-content:center;color:#5A5A5A;">↗</span>
      <span style="flex:1;">Open logs</span>
      <span style="font-family:var(--font-mono);font-size:10px;color:#5A5A5A;">⌘ L</span>
    </div>
    <div style="height:1px;background:rgba(255,255,255,0.07);margin:4px 0;"></div>
    <div style="display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:3px;font-family:var(--font-sans);font-size:13px;color:#FF6366;">
      <span style="width:14px;height:14px;display:inline-flex;align-items:center;justify-content:center;">✕</span>
      <span style="flex:1;">Remove</span>
    </div>
  </div>
</div>
</body></html>
