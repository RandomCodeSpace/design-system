<!doctype html>
<html data-theme="light"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><link rel="stylesheet" href="_card.css?v=6"></head>
<body>
<div class="card" style="background:#F5F5F5;">
  <div style="font-family:var(--font-mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:#5A5A5A;">Cards</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
    <div style="background:#fff;border:1px solid rgba(28,28,28,0.08);border-radius:4px;padding:16px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
        <div style="display:flex;align-items:center;gap:8px;">
          <div style="width:6px;height:6px;border-radius:50%;background:#1C1C1C;box-shadow:0 0 0 3px rgba(28,28,28,0.14);"></div>
          <div style="font-family:var(--font-sans);font-size:14px;font-weight:600;color:#1C1C1C;">vault-primary</div>
        </div>
        <div style="font-family:var(--font-mono);font-size:10px;color:#5A5A5A;letter-spacing:0.04em;">RUNNING</div>
      </div>
      <div style="font-family:var(--font-mono);font-size:11px;color:#5A5A5A;line-height:1.6;">
        <div>uptime&nbsp;&nbsp;<span style="color:#1C1C1C;">14d 02:11</span></div>
        <div>memory&nbsp;&nbsp;<span style="color:#1C1C1C;">48.2 MB</span></div>
        <div>req/s&nbsp;&nbsp;&nbsp;&nbsp;<span style="color:#1C1C1C;">12.4</span></div>
      </div>
    </div>
    <div style="background:#fff;border:1px solid rgba(28,28,28,0.08);border-radius:4px;padding:16px;box-shadow:0 1px 2px rgba(28,28,28,0.06),0 1px 1px rgba(28,28,28,0.04);">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
        <div style="display:flex;align-items:center;gap:8px;">
          <div style="width:6px;height:6px;border-radius:50%;background:#D98E2B;"></div>
          <div style="font-family:var(--font-sans);font-size:14px;font-weight:600;color:#1C1C1C;">gateway</div>
        </div>
        <div style="font-family:var(--font-mono);font-size:10px;color:#5A5A5A;letter-spacing:0.04em;">DEGRADED</div>
      </div>
      <div style="font-family:var(--font-mono);font-size:11px;color:#5A5A5A;line-height:1.6;">
        <div>uptime&nbsp;&nbsp;<span style="color:#1C1C1C;">03:14</span></div>
        <div>memory&nbsp;&nbsp;<span style="color:#1C1C1C;">112 MB</span></div>
        <div>req/s&nbsp;&nbsp;&nbsp;&nbsp;<span style="color:#D98E2B;">0.3 ↓</span></div>
      </div>
    </div>
  </div>
  <div style="font-family:var(--font-sans);font-size:12px;color:#5A5A5A;line-height:1.5;">Flat by default · 1px border · 4px radius · shadow only on hover for interactive cards.</div>
</div>
</body></html>
