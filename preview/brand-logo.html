<!doctype html>

  <div style="font-family:var(--font-sans);font-size:12px;color:#5A5A5A;line-height:1.5;">Bracket-pair with center dot. Mark uses <code style="font-family:var(--font-mono);font-size:11px;background:#F5F5F5;padding:1px 5px;border-radius:2px;">currentColor</code> throughout — strokes and dot inherit the surrounding text color. Pure monochrome, no chroma.</div>
