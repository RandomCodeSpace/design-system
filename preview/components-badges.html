<!doctype html>
<html data-theme="light"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><link rel="stylesheet" href="_card.css?v=6">
<style>
  .badge{display:inline-flex;align-items:center;gap:5px;font-family:var(--font-mono);font-size:10px;letter-spacing:0.04em;text-transform:uppercase;font-weight:500;padding:3px 8px;border-radius:3px;border:1px solid;}
  .dot{width:5px;height:5px;border-radius:50%;}
</style></head>
<body>
<div class="card">
  <div style="font-family:var(--font-mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:#5A5A5A;">Badges &amp; chips</div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
    <span class="badge" style="background:rgba(28,28,28,0.06);border-color:rgba(28,28,28,0.18);color:#1C1C1C;"><span class="dot" style="background:#1C1C1C;"></span>Running</span>
    <span class="badge" style="background:rgba(217,142,43,0.10);border-color:rgba(217,142,43,0.25);color:#8A5A15;"><span class="dot" style="background:#D98E2B;"></span>Degraded</span>
    <span class="badge" style="background:rgba(226,69,72,0.10);border-color:rgba(226,69,72,0.25);color:#8F1F22;"><span class="dot" style="background:#E24548;"></span>Down</span>
    <span class="badge" style="background:#F5F5F5;border-color:rgba(28,28,28,0.08);color:#5A5A5A;"><span class="dot" style="background:#A6A6A6;"></span>Stopped</span>
    <span class="badge" style="background:rgba(28,28,28,0.06);border-color:rgba(28,28,28,0.18);color:#3D3D3D;">New</span>
    <span class="badge" style="background:#fff;border-color:rgba(28,28,28,0.14);color:#3D3D3D;">v0.14.2</span>
  </div>
  <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;">
    <span style="font-family:var(--font-mono);font-size:11px;padding:3px 8px;border-radius:9999px;background:#F5F5F5;border:1px solid rgba(28,28,28,0.08);color:#3D3D3D;">self-hosted</span>
    <span style="font-family:var(--font-mono);font-size:11px;padding:3px 8px;border-radius:9999px;background:#F5F5F5;border:1px solid rgba(28,28,28,0.08);color:#3D3D3D;">wireguard</span>
    <span style="font-family:var(--font-mono);font-size:11px;padding:3px 8px;border-radius:9999px;background:#F5F5F5;border:1px solid rgba(28,28,28,0.08);color:#3D3D3D;">tls</span>
    <span style="font-family:var(--font-mono);font-size:11px;padding:3px 8px;border-radius:9999px;background:#F5F5F5;border:1px solid rgba(28,28,28,0.08);color:#3D3D3D;">cli</span>
    <span style="font-family:var(--font-mono);font-size:11px;padding:3px 8px;border-radius:9999px;background:#1C1C1C;border:1px solid #1C1C1C;color:#FFFFFF;">+ add</span>
  </div>
</div>
</body></html>
