<!doctype html>
<html data-theme="light"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><link rel="stylesheet" href="_card.css?v=6">
<style>
  .frame{background:#FFFFFF;border:1px solid rgba(28,28,28,0.08);border-radius:4px;padding:14px;}
  .ttl{font-family:var(--font-mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:#5A5A5A;margin-bottom:10px;}
  .row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
  .stat{padding:14px;background:#FFFFFF;border:1px solid rgba(28,28,28,0.08);border-radius:4px;}
  .stat .label{font-family:var(--font-mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:#5A5A5A;}
  .stat .num{font-family:var(--font-sans);font-size:24px;font-weight:600;letter-spacing:-0.022em;color:#1C1C1C;margin-top:4px;}
  .stat .delta{font-family:var(--font-mono);font-size:11px;margin-top:2px;}
  .stat .delta.up{color:#1F9E5C;}
  .stat .delta.down{color:#9E0000;}
  .stat svg{display:block;margin-top:8px;}
</style></head>
<body>
<div class="card" style="background:#F5F5F5;">
  <div style="font-family:var(--font-mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:#5A5A5A;">Charts · Sparkline · embedded in Stat cards · pure SVG, zero deps</div>

  <div class="row">
    <div class="stat">
      <div class="label">Requests / min</div>
      <div class="num">12,481</div>
      <div class="delta up">↑ 4.2%</div>
      <svg viewBox="0 0 80 24" width="100%" height="24" preserveAspectRatio="none">
        <polyline points="0,18 8,16 16,18 24,14 32,12 40,15 48,10 56,8 64,6 72,4 80,2" fill="none" stroke="#E60000" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" vector-effect="non-scaling-stroke"/>
      </svg>
    </div>
    <div class="stat">
      <div class="label">Error rate</div>
      <div class="num">0.024%</div>
      <div class="delta down">↓ 38%</div>
      <svg viewBox="0 0 80 24" width="100%" height="24" preserveAspectRatio="none">
        <path d="M0,24 L0,4 L8,6 L16,5 L24,8 L32,10 L40,9 L48,14 L56,18 L64,17 L72,21 L80,22 L80,24 Z" fill="#1C1C1C" fill-opacity="0.13"/>
        <polyline points="0,4 8,6 16,5 24,8 32,10 40,9 48,14 56,18 64,17 72,21 80,22" fill="none" stroke="#1C1C1C" stroke-width="1.5" stroke-linejoin="round" vector-effect="non-scaling-stroke"/>
      </svg>
    </div>
    <div class="stat">
      <div class="label">P99 latency</div>
      <div class="num">142ms</div>
      <div class="delta">↑ 3ms</div>
      <svg viewBox="0 0 80 24" width="100%" height="24" preserveAspectRatio="none">
        <polyline points="0,12 8,11 16,13 24,12 32,10 40,12 48,11 56,9 64,11 72,10 80,8" fill="none" stroke="#5A5A5A" stroke-width="1.5" stroke-linejoin="round" vector-effect="non-scaling-stroke"/>
      </svg>
    </div>
  </div>

  <div class="frame">
    <div class="ttl">Sparkline · variants</div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;">
      <div>
        <div style="font-family:var(--font-mono);font-size:10px;color:#A6A6A6;margin-bottom:6px;">line</div>
        <svg viewBox="0 0 120 28" width="100%" height="28" preserveAspectRatio="none"><polyline points="0,22 12,18 24,20 36,14 48,16 60,10 72,12 84,8 96,6 108,4 120,2" fill="none" stroke="#E60000" stroke-width="1.5" vector-effect="non-scaling-stroke"/></svg>
      </div>
      <div>
        <div style="font-family:var(--font-mono);font-size:10px;color:#A6A6A6;margin-bottom:6px;">area</div>
        <svg viewBox="0 0 120 28" width="100%" height="28" preserveAspectRatio="none">
          <path d="M0,28 L0,22 L12,18 L24,20 L36,14 L48,16 L60,10 L72,12 L84,8 L96,6 L108,4 L120,2 L120,28 Z" fill="#E60000" fill-opacity="0.18"/>
          <polyline points="0,22 12,18 24,20 36,14 48,16 60,10 72,12 84,8 96,6 108,4 120,2" fill="none" stroke="#E60000" stroke-width="1.5" vector-effect="non-scaling-stroke"/>
        </svg>
      </div>
      <div>
        <div style="font-family:var(--font-mono);font-size:10px;color:#A6A6A6;margin-bottom:6px;">mono</div>
        <svg viewBox="0 0 120 28" width="100%" height="28" preserveAspectRatio="none"><polyline points="0,12 12,11 24,15 36,8 48,14 60,10 72,16 84,9 96,11 108,7 120,12" fill="none" stroke="#1C1C1C" stroke-width="1.5" vector-effect="non-scaling-stroke"/></svg>
      </div>
      <div>
        <div style="font-family:var(--font-mono);font-size:10px;color:#A6A6A6;margin-bottom:6px;">noisy / dense</div>
        <svg viewBox="0 0 120 28" width="100%" height="28" preserveAspectRatio="none">
          <polyline points="0,14 4,18 8,12 12,16 16,10 20,15 24,12 28,16 32,8 36,14 40,11 44,17 48,9 52,13 56,7 60,12 64,9 68,14 72,8 76,11 80,5 84,10 88,7 92,13 96,6 100,9 104,4 108,8 112,3 116,7 120,2" fill="none" stroke="#5A5A5A" stroke-width="1.2" vector-effect="non-scaling-stroke"/>
        </svg>
      </div>
    </div>
  </div>

  <div style="font-family:var(--font-mono);font-size:10px;color:#A6A6A6;letter-spacing:0.04em;text-transform:uppercase;">Sparkline auto-fits container · respects accent color · also rendered inline by &lt;Stat&gt;</div>
</div>
</body></html>
