<!doctype html>
<html data-theme="light"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><link rel="stylesheet" href="_card.css?v=6">
<style>
  .crumb{font-family:var(--font-sans);font-size:12px;color:#5A5A5A;display:flex;align-items:center;gap:6px;}
  .crumb a{color:#5A5A5A;text-decoration:none;}
  .crumb a:hover{color:#1C1C1C;}
  .crumb .sep{color:#CCCCCC;}
  .crumb .current{color:#1C1C1C;font-weight:500;}
  .pill{font-family:var(--font-mono);font-size:10px;padding:2px 7px;border-radius:9999px;background:#F5F5F5;color:#3D3D3D;border:1px solid rgba(28,28,28,0.08);}
  .pill.green{background:#F5F5F5;color:#1C1C1C;border-color:rgba(28,28,28,0.14);}
  .pill.red{background:rgba(230,0,0,0.08);color:#9E0000;border-color:rgba(230,0,0,0.18);}
  .btn{font-family:var(--font-sans);font-size:12px;font-weight:500;border-radius:4px;padding:6px 11px;border:1px solid transparent;cursor:pointer;display:inline-flex;align-items:center;gap:5px;}
  .btn.p{background:#E60000;color:#FFFFFF;}
  .btn.s{background:#FFFFFF;color:#1C1C1C;border-color:rgba(28,28,28,0.14);}
  .btn.g{background:transparent;color:#3D3D3D;}
</style></head>
<body>
<div class="card">
  <div style="font-family:var(--font-mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:#5A5A5A;">Page header · breadcrumb · actions</div>

  <div style="background:#FFFFFF;border:1px solid rgba(28,28,28,0.08);border-radius:4px;padding:18px 20px;display:flex;flex-direction:column;gap:14px;">
    <div class="crumb">
      <a href="#">Services</a>
      <span class="sep">/</span>
      <a href="#">Production</a>
      <span class="sep">/</span>
      <span class="current">vault-primary</span>
    </div>
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:16px;">
      <div style="display:flex;flex-direction:column;gap:6px;">
        <div style="display:flex;align-items:center;gap:10px;">
          <h1 style="font-size:22px;font-weight:600;letter-spacing:-0.014em;margin:0;color:#1C1C1C;">vault-primary</h1>
          <span class="pill green">● running</span>
          <span class="pill">v0.14.2</span>
        </div>
        <div style="font-family:var(--font-sans);font-size:13px;color:#5A5A5A;">Self-hosted secrets vault · us-east-1 · last deploy 2h ago</div>
      </div>
      <div style="display:flex;gap:6px;">
        <button class="btn g">⋯</button>
        <button class="btn s">Logs</button>
        <button class="btn s">Restart</button>
        <button class="btn p">Deploy</button>
      </div>
    </div>
  </div>

  <div style="background:#FFFFFF;border:1px solid rgba(28,28,28,0.08);border-radius:4px;padding:14px 18px;">
    <div class="crumb">
      <a href="#">Settings</a>
      <span class="sep">/</span>
      <span class="current">Team</span>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:6px;">
      <h2 style="font-size:17px;font-weight:600;margin:0;color:#1C1C1C;">Team members</h2>
      <button class="btn p">+ Invite</button>
    </div>
  </div>
</div>
</body></html>
