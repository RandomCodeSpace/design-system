<!doctype html>
<html data-theme="light"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><link rel="stylesheet" href="_card.css?v=6"></head>
<body>
<div class="card">
  <div style="font-family:var(--font-mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:#5A5A5A;">Semantic</div>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;">
    <div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
        <div style="width:14px;height:14px;border-radius:3px;background:#1C1C1C;"></div>
        <div style="font-family:var(--font-mono);font-size:11px;color:#3D3D3D;">success</div>
      </div>
      <div style="padding:8px 10px;background:rgba(28,28,28,0.06);border:1px solid rgba(28,28,28,0.18);border-radius:4px;font-family:var(--font-mono);font-size:11px;color:#1C1C1C;">Deployed in 2.3s</div>
    </div>
    <div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
        <div style="width:14px;height:14px;border-radius:3px;background:#D98E2B;"></div>
        <div style="font-family:var(--font-mono);font-size:11px;color:#3D3D3D;">warning</div>
      </div>
      <div style="padding:8px 10px;background:rgba(217,142,43,0.10);border:1px solid rgba(217,142,43,0.25);border-radius:4px;font-family:var(--font-mono);font-size:11px;color:#8A5A15;">Cert expires in 6d</div>
    </div>
    <div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
        <div style="width:14px;height:14px;border-radius:3px;background:#E24548;"></div>
        <div style="font-family:var(--font-mono);font-size:11px;color:#3D3D3D;">danger</div>
      </div>
      <div style="padding:8px 10px;background:rgba(226,69,72,0.10);border:1px solid rgba(226,69,72,0.25);border-radius:4px;font-family:var(--font-mono);font-size:11px;color:#8F1F22;">Connection refused</div>
    </div>
    <div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
        <div style="width:14px;height:14px;border-radius:3px;background:#2D73D9;"></div>
        <div style="font-family:var(--font-mono);font-size:11px;color:#3D3D3D;">info</div>
      </div>
      <div style="padding:8px 10px;background:rgba(45,115,217,0.10);border:1px solid rgba(45,115,217,0.25);border-radius:4px;font-family:var(--font-mono);font-size:11px;color:#1A4A8F;">New version 0.14</div>
    </div>
  </div>
  <div style="font-family:var(--font-sans);font-size:12px;color:#5A5A5A;line-height:1.5;padding-top:4px;">Muted semantic colors — they signal, they don't shout. Each pairs with a 10% tint surface and a 25% border.</div>
</div>
</body></html>
