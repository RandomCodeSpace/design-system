<!doctype html>
<html data-theme="light" lang="en">
<head>
<meta charset="utf-8">
<title>RCS Docs — Deploy your first service</title>
<link rel="stylesheet" href="../../colors_and_type.css?v=4">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  html, body { margin: 0; padding: 0; }
  body { background: var(--bg-0); color: var(--fg-1); }
  * { box-sizing: border-box; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="DocsSidebar.jsx"></script>
<script type="text/babel" src="Article.jsx"></script>
<script type="text/babel" src="TOC.jsx"></script>

<script type="text/babel">
function App() {
  const [theme, setTheme] = React.useState('light');
  React.useEffect(() => { document.documentElement.setAttribute('data-theme', theme); }, [theme]);

  return (
    <>
      <nav style={{
        position: 'sticky', top: 0, height: 56, zIndex: 10,
        display: 'flex', alignItems: 'center', gap: 16, padding: '0 24px',
        borderBottom: '1px solid var(--border-1)', background: 'var(--bg-0)'
      }}>
        <a href="#" style={{display: 'flex', alignItems: 'center', gap: 10, textDecoration: 'none'}}>
          <svg width="22" height="22" viewBox="0 0 64 64" fill="none" style={{color: 'var(--fg-1)'}}>
            <path d="M22 14 L14 14 L14 50 L22 50" stroke="currentColor" strokeWidth="3" fill="none"/>
            <path d="M42 14 L50 14 L50 50 L42 50" stroke="currentColor" strokeWidth="3" fill="none"/>
            <circle cx="32" cy="32" r="4" fill="#E60000"/>
          </svg>
          <span style={{fontFamily: 'var(--font-mono)', fontSize: 13, fontWeight: 600, color: 'var(--fg-1)'}}>randomcodespace</span>
          <span style={{fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--fg-3)', marginLeft: 4, padding: '2px 6px', border: '1px solid var(--border-1)', borderRadius: 3}}>docs</span>
        </a>
        <div style={{flex: 1}}/>
        <div style={{display: 'flex', alignItems: 'center', gap: 8, padding: '5px 10px', borderRadius: 4, background: 'var(--bg-1)', border: '1px solid var(--border-1)', fontFamily: 'var(--font-sans)', fontSize: 12.5, color: 'var(--fg-3)', width: 240}}>
          Search docs…
          <span style={{marginLeft: 'auto', fontFamily: 'var(--font-mono)', fontSize: 10, color: 'var(--fg-3)', background: 'var(--bg-2)', border: '1px solid var(--border-1)', padding: '1px 5px', borderRadius: 3}}>⌘K</span>
        </div>
        <button onClick={() => setTheme(theme === 'dark' ? 'light' : 'dark')} style={{width: 28, height: 28, borderRadius: 4, border: '1px solid var(--border-1)', background: 'var(--bg-1)', color: 'var(--fg-2)', cursor: 'pointer', fontFamily: 'var(--font-mono)', fontSize: 11}}>
          {theme === 'dark' ? '☾' : '☀'}
        </button>
      </nav>
      <div style={{display: 'grid', gridTemplateColumns: '240px 1fr 200px', maxWidth: 1280, margin: '0 auto'}}>
        <DocsSidebar/>
        <Article/>
        <TOC/>
      </div>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
